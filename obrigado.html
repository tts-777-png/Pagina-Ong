<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Obrigado! | Adote uma Pegada</title>
    <link rel="stylesheet" href="src/css/styles.css">
</head>
<body>
    <div class="container gratitude-page">
        <div class="gratitude-card">
            <span class="icon">🐾</span>
            <h1>Você é incrível!</h1>
            <p>Sua doação foi confirmada. Agora, preencha os dados abaixo para enviarmos sua <strong>Carteirinha Oficial de Membro</strong> da ONG.</p>
            
            <form action="https://formsubmit.co/SEU-EMAIL@EMAIL.COM" method="POST" class="brinde-form">
                <input type="text" name="nome" placeholder="Nome Completo" required>
                <input type="text" name="endereco" placeholder="Endereço para entrega (Rua, Nº, Bairro)" required>
                <input type="text" name="cidade" placeholder="Cidade/Estado" required>
                <input type="text" name="cep" placeholder="CEP" required>
                <button type="submit" class="btn-final">Solicitar Minha Carteirinha</button>
            </form>
            <a href="/" class="back-link">Voltar ao site</a>
        </div>
    </div>
</body>
</html>
